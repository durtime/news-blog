baseURL = 'https://yourusername.github.io/news-blog/'  # 稍后替换为你的GitHub用户名
languageCode = 'zh-CN'
title = '每日新闻聚合'
theme = 'paper'

# 作者信息（放在顶层，不在params中）
author = "新闻聚合系统"

[params]
  subtitle = "自动收集、智能汇总的每日新闻"
  description = "每日自动从各大新闻源收集、汇总并发布的新闻博客"
  keywords = ["新闻", "聚合", "每日新闻", "自动化"]
  
  # 主题配置
  homeMode = "list"  # 首页显示模式：list或post
  github = "https://github.com/yourusername"  # 你的GitHub地址
  twitter = ""  # 可选
  
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 1
    
  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 2
    
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 3
    
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 4
