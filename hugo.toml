baseURL = 'https://durtime.github.io/news-blog/'
languageCode = 'zh-CN'
title = '每日新闻聚合'
theme = 'paper'

# 作者信息（按照Paper主题的格式）
[params]
  name = "新闻聚合系统"
  bio = "每日自动从各大新闻源收集、汇总并发布的新闻博客"
  avatar = ""
  
  # 网站信息
  subtitle = "自动收集、智能汇总的每日新闻"
  description = "每日自动从各大新闻源收集、汇总并发布的新闻博客"
  
  # 社交链接
  github = "https://github.com/durtime"
  twitter = ""
  
  # 主题配置
  color = "linen"
  homeMode = "list"
  
  # SEO
  keywords = ["新闻", "聚合", "每日新闻", "自动化"]
  
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 1
    
  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 2
    
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 3
    
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 4
