name: Deploy to GitHub Pages

on:
  schedule:
    # 每天8:00和20:00（UTC时间）运行，对应北京时间16:00和次日4:00
    - cron: '0 0,12 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Python dependencies
      run: |
        pip install feedparser beautifulsoup4 python-frontmatter markdown
        
    - name: Setup Hugo
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: '0.157.0'
        extended: true
        
    - name: Collect news
      run: |
        cd scripts
        python3 news_collector.py
        
    - name: Process news
      run: |
        cd scripts
        python3 news_processor.py
        
    - name: Build site
      run: hugo --minify
      
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        publish_branch: gh-pages
        force_orphan: true
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'Automated deployment: ${{ github.event.head_commit.message || github.run_id }}'